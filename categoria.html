<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Giupi - El Tablero</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #020617; min-height: 100vh; margin: 0; padding-bottom: 50px; color: #f1f5f9; overflow-x: hidden; }

        .header-categoria {
            display: flex; align-items: center; justify-content: space-between;
            padding: 25px 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(251, 191, 36, 0.1);
        }
        .btn-volver {
            background: rgba(251, 191, 36, 0.1); color: #fbbf24; border: none; border-radius: 50%;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; text-decoration: none;
        }

        .btn-random-top {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #020617; border: none; padding: 12px 25px; border-radius: 30px;
            font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3); cursor: pointer;
            text-transform: uppercase;
        }

        .grid-misiones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .carta { perspective: 1000px; aspect-ratio: 3/4; cursor: pointer; }
        .carta-inner { position: relative; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .carta.volteada .carta-inner { transform: rotateY(180deg); }
        
        .carta-frente, .carta-atras { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden;
        }
        
        .carta-frente { 
            background: #0f172a; 
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.05);
        }
        .giupi-sello {
            position: absolute; width: 90%; opacity: 0.35; z-index: 1;
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.2));
        }
        .numero-carta {
            font-family: 'Cinzel', serif; font-size: 2.8rem; font-weight: 700; z-index: 2;
            background: linear-gradient(to bottom, #fde68a, #fbbf24, #b45309);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .carta-atras { 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            color: #f8fafc; transform: rotateY(180deg); 
            border: 2px solid #fbbf24; flex-direction: column; padding: 12px;
        }
        .mision-txt { font-size: 0.75rem; font-weight: 600; line-height: 1.2; margin-top: 5px; text-align: center; }

        .highlight { animation: pulso-oro 1.5s infinite; }
        @keyframes pulso-oro {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
    </style>
</head>
<body>

    <header class="header-categoria">
        <a href="muro.html" class="btn-volver">←</a>
        <button class="btn-random-top" onclick="escogerPorMi()">¿QUÉ HACEMOS HOY?</button>
        <div style="width: 45px;"></div>
    </header>

    <main class="grid-misiones" id="contenedor-cartas"></main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const categoriaActual = urlParams.get('cat') || 'distancia'; 

        const imagenesGiupi = {
            'distancia': 'giupi-viajero.png',
            'reencuentro': 'giupi-elegante.png',
            'casa': 'giupi-chef.png',
            'airelibre': 'giupi-explorador.png'
        };
        const imagenFondo = imagenesGiupi[categoriaActual];
        const sonidoGiupi = new Audio('giupi.mp3');

        const baseDeDatos = {
            'distancia': [
                "Ver la misma película sincronizados presionando 'play' al mismo tiempo",
                "Enviar una sorpresa por delivery usando PedidosYa directamente a su casa",
                "Cena por videollamada vestidos de forma elegante",
                "Jugar algún videojuego cooperativo online",
                "Tour virtual por algún museo internacional usando Google Arts",
                "Armar una lista de reproducción compartida",
                "Leer el mismo capítulo de un libro y comentarlo",
                "Reto de fotos: enviarse 5 fotos de su día a día",
                "Enviar un audio cantando una nota de voz sin vergüenza",
                "Pedir exactamente el mismo snack en sus respectivas ciudades y comerlo en cámara",
                "Hacer un test de personalidad online (MBTI) juntos",
                "Planear un viaje futuro viendo mapas y presupuestos",
                "Ver el atardecer juntos por videollamada",
                "Escribir una historia de a dos por WhatsApp (una oración cada uno)",
                "Descubrir música nueva recomendándose 3 canciones",
                "Estudiar un idioma juntos (Duolingo en equipo)",
                "Juego de 'Las 36 preguntas para enamorarse'",
                "Enviar un pequeño detalle por correo tradicional",
                "Dormir con la videollamada encendida",
                "Maratón de series compartiendo pantalla",
                "Hacerse dibujos rápidos y mostrarlos en cámara",
                "Escuchar el mismo podcast al mismo tiempo",
                "Sesión de 'verdad o reto' a distancia",
                "Meditar juntos con el mismo audio de fondo",
                "Grabar un mini-vlog de su día exclusivo para el otro"
            ],
            'reencuentro': [
                "El abrazo largo sin prisa en el terminal o aeropuerto",
                "Ir por un desayuno de panes o empanadas recién horneadas",
                "Estrenar una fragancia pensada específicamente para el clima de ese día",
                "Cena de celebración en un lugar elegante",
                "Noche de hotel en la propia ciudad solo para desconectar",
                "Intercambio de los regalos que acumularon en la distancia",
                "Un brindis con copas por estar juntos de nuevo",
                "Desayuno en la cama preparado por el anfitrión",
                "Caminata sin rumbo solo para hablar",
                "Visitar el lugar exacto de su primera cita",
                "Sesión de fotos juntos para actualizar los fondos de pantalla",
                "Tarde completa sin mirar el celular",
                "Cocinar un plato laborioso juntos post-viaje",
                "Tarde de spa y masajes en casa",
                "Salir a bailar o a un bar con buena música",
                "Acostarse a ver las estrellas si el cielo está despejado",
                "Desempacar las maletas juntos con música de fondo",
                "Ir por un helado artesanal",
                "Noche de cobijas y películas",
                "Baño relajante o ducha juntos",
                "Probar un restaurante totalmente nuevo",
                "'Cita a ciegas': uno elige todo el itinerario y el otro solo se deja llevar",
                "Escribir una carta sobre lo que sintieron al verse",
                "Hacer una lista de metas a corto plazo",
                "Comprar un recuerdo físico del día del reencuentro"
            ],
            'casa': [
                "Noche de cocina: Preparar un buen chaufa de pollo desde cero",
                "Sesión musical: Escuchar los últimos arreglos o maquetas de 'Amor sin interés' o 'Calma'",
                "Hacer una rutina de ejercicios o día de pierna en la sala",
                "Noche de juegos de mesa o cartas",
                "Maratón de la saga de películas favorita de uno de los dos",
                "Armar un rompecabezas grande",
                "Cata de cervezas o vinos comprados en el supermercado",
                "Tarde de pintura (incluso si pintan mal)",
                "Preparar un postre horneado",
                "Reorganizar un cuarto o la decoración juntos",
                "Noche de karaoke en YouTube",
                "Leer un artículo largo o un cuento en voz alta",
                "Hacer un picnic en el piso de la sala",
                "Fondue de chocolate o queso casero",
                "Bailar en la sala sin música de fondo",
                "Armar un álbum de fotos físico",
                "Hacer pizzas caseras armando cada uno su mitad",
                "Sesión profunda de estiramientos",
                "Competencia de videojuegos",
                "Revisar y organizar las finanzas de la casa",
                "Hacer alguna manualidad sencilla (origami, arcilla)",
                "Guerra de almohadas clásica",
                "Contarse anécdotas de la infancia que nunca se hayan dicho",
                "Preparar cócteles o bebidas creativas",
                "Acampar en la sala con sábanas y luces"
            ],
            'airelibre': [
                "Salir a volar el dron (el Mini o el Mavic) para hacer tomas aéreas de un paisaje",
                "Tarde deportiva: Ver un partido de fútbol amateur desde la tribuna o jugar juntos en cancha sintética",
                "Hacer una ruta o escape rápido por la región montañosa local",
                "Tomar un paseo en bote por un río o laguna",
                "Buscar el mejor 'huarique' para comer ceviche mixto",
                "Ciclismo urbano (salir a pedalear por la ciudad)",
                "Caminata arquitectónica por el centro histórico",
                "Madrugar para ver el amanecer desde un punto alto",
                "Visitar ruinas, huacas o zonas arqueológicas",
                "Viaje corto a la playa a caminar por la arena",
                "Armar una carpa y acampar una noche",
                "Subir a un mirador de la ciudad",
                "Tarde de fotografía callejera con el celular",
                "Visitar un pueblito cercano al que nunca hayan ido",
                "Ir a los juegos mecánicos o parque de diversiones",
                "Tomar una clase al aire libre",
                "Observación de aves o buscar animales en un bosque",
                "Ir a un cine al aire libre o evento público",
                "Hacer una fogata pequeña (donde sea permitido) y quemar malvaviscos",
                "Volar una cometa",
                "Visitar un jardín botánico o vivero",
                "Salir a pasear al perro (Keylor, si está con ustedes) por un parque grande",
                "Recorrer una feria local de artesanos",
                "Hacer una ruta buscando murales o graffitis urbanos",
                "Sentarse en una plaza simplemente a ver pasar a la gente con un café"
            ]
        };

        const lista = baseDeDatos[categoriaActual] || [];
        const contenedor = document.getElementById('contenedor-cartas');
        let volteadas = JSON.parse(localStorage.getItem('misiones_' + categoriaActual)) || [];

        for (let i = 0; i < 25; i++) {
            const mision = lista[i] || "Misión por definir";
            const esVolteada = volteadas.includes(i) ? 'volteada' : '';

            contenedor.innerHTML += `
                <div class="carta ${esVolteada}" id="carta-${i}" onclick="gestionarClic(${i}, '${mision.replace(/'/g, "\\'")}')">
                    <div class="carta-inner">
                        <div class="carta-frente">
                            <img src="${imagenFondo}" class="giupi-sello" alt="">
                            <span class="numero-carta">${i + 1}</span>
                        </div>
                        <div class="carta-atras">
                            <span style="color:#fbbf24; font-size:0.5rem; letter-spacing:2px">NUESTRA CITA</span>
                            <span class="mision-txt">${mision}</span>
                            <span style="color:#00d2ff; font-size:0.5rem; margin-top:10px; font-weight:bold">TAP PARA SELLAR</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function gestionarClic(i, textoMision) {
            const el = document.getElementById('carta-' + i);
            
            if (!el.classList.contains('volteada')) {
                el.classList.remove('highlight');
                el.classList.add('volteada');
            } else {
                localStorage.setItem('misionActual', textoMision);
                localStorage.setItem('misionIndex', i); 
                localStorage.setItem('misionCategoria', categoriaActual); 
                window.location.href = 'registro.html';
            }
        }

        function escogerPorMi() {
            const cerradas = [];
            for(let i=0; i<25; i++) {
                if(!volteadas.includes(i)) cerradas.push(i);
            }
            if(cerradas.length === 0) { alert("¡Completaron todas las misiones! 🏆"); return; }
            
            const elegido = cerradas[Math.floor(Math.random() * cerradas.length)];
            const el = document.getElementById('carta-' + elegido);
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('highlight');
            
            // Aquí está el arreglo: Suena primero el audio, espera medio segundo, y luego sale la alerta
            sonidoGiupi.play().catch(e => console.log("Audio bloqueado"));
            
            setTimeout(() => {
                alert("Giupi ha elegido la cita número " + (elegido + 1) + " para hoy. ✨");
            }, 300);
        }
        
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                window.location.reload();
            }
        });

    </script>
</body>
</html>
