<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Giupi - El Tablero</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #020617; min-height: 100vh; margin: 0; padding-bottom: 50px; color: #f1f5f9; overflow-x: hidden; }

        /* CABECERA MINIMALISTA */
        .header-categoria {
            display: flex; align-items: center; justify-content: space-between;
            padding: 25px 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(251, 191, 36, 0.1);
        }
        .btn-volver {
            background: rgba(251, 191, 36, 0.1); color: #fbbf24; border: none; border-radius: 50%;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; text-decoration: none;
        }

        /* BOTÓN DE AZAR SUPERIOR */
        .btn-random-top {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #020617; border: none; padding: 12px 25px; border-radius: 30px;
            font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3); cursor: pointer;
            text-transform: uppercase;
        }

        /* TABLERO DE CARTAS */
        .grid-misiones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .carta { perspective: 1000px; aspect-ratio: 3/4; cursor: pointer; }
        .carta-inner { position: relative; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .carta.volteada .carta-inner { transform: rotateY(180deg); }
        
        .carta-frente, .carta-atras { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden;
        }
        
        /* DISEÑO FRONTAL: GIUPI Y ORO */
        .carta-frente { 
            background: #0f172a; 
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.05);
        }
        .giupi-sello {
            position: absolute; width: 90%; opacity: 0.35; z-index: 1;
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.2));
        }
        .numero-carta {
            font-family: 'Cinzel', serif; font-size: 2.8rem; font-weight: 700; z-index: 2;
            background: linear-gradient(to bottom, #fde68a, #fbbf24, #b45309);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* DISEÑO TRASERO: LA CITA */
        .carta-atras { 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            color: #f8fafc; transform: rotateY(180deg); 
            border: 2px solid #fbbf24; flex-direction: column; padding: 15px;
        }
        .mision-txt { font-size: 0.8rem; font-weight: 600; line-height: 1.3; margin-top: 10px; text-align: center; }
        .btn-completar {
            margin-top: 15px; background: #00d2ff; color: #020617;
            border: none; padding: 8px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: transform 0.2s;
        }
        .btn-completar:active { transform: scale(0.9); }

        /* ANIMACIÓN DE BRILLO (HIGHLIGHT) */
        .highlight { animation: pulso-oro 1.5s infinite; }
        @keyframes pulso-oro {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
    </style>
</head>
<body>

    <header class="header-categoria">
        <a href="muro.html" class="btn-volver">←</a>
        <button class="btn-random-top" onclick="escogerPorMi()">¿QUÉ HACEMOS HOY?</button>
        <div style="width: 45px;"></div> </header>

    <main class="grid-misiones" id="contenedor-cartas">
        </main>

    <script>
        // 1. LECTURA DE CATEGORÍA E IMAGEN DE FONDO
        const urlParams = new URLSearchParams(window.location.search);
        const categoriaActual = urlParams.get('cat') || 'distancia'; 
        
        const imagenesGiupi = {
            'distancia': 'giupi-viajero.png',
            'reencuentro': 'giupi-elegante.png',
            'casa': 'giupi-chef.png',
            'airelibre': 'giupi-explorador.png'
        };
        const imagenFondo = imagenesGiupi[categoriaActual];

        // 2. MOTOR DE AUDIO
        const sonidoGiupi = new Audio('giupi.mp3');

        // ====================================================================
        // AQUÍ ES DONDE AGREGARÁS TUS 25 CITAS MANUALMENTE 
        // ====================================================================
        const baseDeDatos = {
            'distancia': ["Cena por videollamada", "Ver peli juntos", "Enviar un regalo"],
            'reencuentro': ["Abrazo de 1 minuto", "Cena romántica", "Paseo de la mano"],
            'casa': ["Noche de pizza", "Maratón de series", "Día de spa"],
            'airelibre': ["Pícnic en el parque", "Caminata al amanecer", "Volar el dron"]
        };
        // ====================================================================

        // 3. GENERADOR DE CARTAS
        const lista = baseDeDatos[categoriaActual] || [];
        const contenedor = document.getElementById('contenedor-cartas');
        let volteadas = JSON.parse(localStorage.getItem('misiones_' + categoriaActual)) || [];

        for (let i = 0; i < 25; i++) {
            const mision = lista[i] || "Misión por definir";
            const esVolteada = volteadas.includes(i) ? 'volteada' : '';

            contenedor.innerHTML += `
                <div class="carta ${esVolteada}" id="carta-${i}" onclick="voltear(${i})">
                    <div class="carta-inner">
                        <div class="carta-frente">
                            <img src="${imagenFondo}" class="giupi-sello" alt="">
                            <span class="numero-carta">${i + 1}</span>
                        </div>
                        <div class="carta-atras">
                            <span style="color:#fbbf24; font-size:0.6rem; letter-spacing:2px">NUESTRA CITA</span>
                            <span class="mision-txt">${mision}</span>
                            <button class="btn-completar" onclick="irARegistro(event, '${mision}')">SELLAR MISIÓN</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // 4. LÓGICA DE VOLTEO MANUAL
        function voltear(i) {
            const el = document.getElementById('carta-' + i);
            if (el.classList.contains('volteada')) return; // Si ya se volteó, no hace nada
            
            el.classList.remove('highlight');
            el.classList.add('volteada');
            
            volteadas.push(i);
            localStorage.setItem('misiones_' + categoriaActual, JSON.stringify(volteadas));
        }

        // 5. FUNCIÓN PUENTE: ENVIAR DATOS A REGISTRO.HTML
        function irARegistro(evento, textoMision) {
            evento.stopPropagation(); // Evita que la carta se cierre o buguee al hacer click en el botón
            localStorage.setItem('misionActual', textoMision); // Guarda el nombre de la cita
            window.location.href = 'registro.html'; // Viaja a la pantalla de registro
        }

        // 6. LÓGICA DE AZAR CON SUSPENSO Y SONIDO
        function escogerPorMi() {
            const cerradas = [];
            for(let i=0; i<25; i++) {
                if(!volteadas.includes(i)) cerradas.push(i);
            }
            if(cerradas.length === 0) { alert("¡Completaron todas las misiones! 🏆"); return; }
            
            const elegido = cerradas[Math.floor(Math.random() * cerradas.length)];
            const el = document.getElementById('carta-' + elegido);
            
            // Navega automáticamente hasta la carta elegida
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // Activa el brillo dorado para crear expectativa
            el.classList.add('highlight');
            
            // Espera 800ms antes de gritar "Yupi" y mostrar el mensaje
            setTimeout(() => {
                sonidoGiupi.play().catch(e => console.log("Audio bloqueado por el navegador"));
                alert("Giupi ha elegido la cita número " + (elegido + 1) + " para hoy. ✨");
            }, 800);
        }
    </script>
</body>
</html>
