<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Giupi - Nuestro Muro</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #020617; min-height: 100vh; padding: 40px 0 50px; margin: 0; transition: opacity 0.5s ease; overflow-x: hidden; }
        
        .panel-cajones { display: flex; flex-direction: column; gap: 15px; padding: 0 20px; }

        /* CATEGORÍAS PRINCIPALES */
        .cajon-premium {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); text-decoration: none;
        }
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cajon-premium h3 { font-size: 0.85rem; font-weight: 700; margin: 0; color: #f1f5f9; text-transform: uppercase; letter-spacing: 1.2px; }

        /* BOTÓN REVIVIR AL AZAR */
        .btn-random {
            margin-top: 10px; background: linear-gradient(135deg, rgba(251, 191, 36, 0.05), rgba(0, 210, 255, 0.05));
            border: 1px dashed rgba(251, 191, 36, 0.3); border-radius: 20px; padding: 18px;
            text-align: center; color: #fbbf24; font-size: 0.85rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
            transition: transform 0.2s, background 0.3s;
        }
        .btn-random:active { transform: scale(0.95); background: rgba(251, 191, 36, 0.15); }

        /* BARRA DE PROGRESO DE LA HISTORIA */
        .contenedor-progreso {
            margin-top: 25px; padding: 20px; background: rgba(15, 23, 42, 0.5);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.03);
        }
        .texto-progreso { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .label-progreso { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .num-progreso { color: #00d2ff; font-weight: 700; font-size: 0.9rem; }
        
        .barra-fondo { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.08); border-radius: 10px; position: relative; }
        .barra-llena { 
            height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #fbbf24); 
            border-radius: 10px; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; 
        }
        .giupi-corredor {
            position: absolute; right: -15px; top: -14px; width: 32px; height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); animation: flotar-suave 2s infinite ease-in-out;
        }

        /* ANIMACIONES */
        @keyframes flotar-suave { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
        .img-cat { width: 85%; max-height: 90px; object-fit: contain; animation: flotar-suave 3s ease-in-out infinite; }
        .grid-2x2 a:nth-child(1) .img-cat { animation-delay: 0s; }
        .grid-2x2 a:nth-child(2) .img-cat { animation-delay: 0.5s; }
        .grid-2x2 a:nth-child(3) .img-cat { animation-delay: 1s; }
        .grid-2x2 a:nth-child(4) .img-cat { animation-delay: 1.5s; }
                /* EFECTO CORAZONES */
        .corazon-particula { position: fixed; pointer-events: none; z-index: 2000; animation: volar-particula var(--duracion) ease-out forwards; font-size: 1.2rem; }
        @keyframes volar-particula { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; } 
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } 
        }

    </style>
</head>
<body id="cuerpo">
    <main class="panel-cajones">
        
        <div class="grid-2x2">
            <a href="categoria.html?cat=distancia" class="cajon-premium">
                <img src="giupi-viajero.png" alt="Distancia" class="img-cat">
                <h3>A DISTANCIA</h3>
            </a>
            <a href="categoria.html?cat=reencuentro" class="cajon-premium">
                <img src="giupi-elegante.png" alt="Reencuentro" class="img-cat">
                <h3>REENCUENTRO</h3>
            </a>
            <a href="categoria.html?cat=casa" class="cajon-premium">
                <img src="giupi-chef.png" alt="En Casa" class="img-cat">
                <h3>EN CASA</h3>
            </a>
            <a href="categoria.html?cat=airelibre" class="cajon-premium">
                <img src="giupi-explorador.png" alt="Aire Libre" class="img-cat">
                <h3>AIRE LIBRE</h3>
            </a>
        </div>

        <div class="contenedor-progreso">
            <div class="texto-progreso">
                <span class="label-progreso">Nuestra Historia</span>
                <span class="num-progreso" id="contador-progreso">0 / 100</span>
            </div>
            <div class="barra-fondo">
                <div class="barra-llena" id="barra-progreso">
                    <img src="giupi.png" class="giupi-corredor" alt="Giupi Tracker">
                </div>
            </div>
        </div>

        <div class="btn-random" id="btn-revivir">
            ✨ REVIVIR UN INSTANTE ALEATORIO
        </div>

    </main>

    <script>

                "Cena por videollamada vestidos de forma elegante",

                "Maratón de series compartiendo pantalla",
                "Hacerse dibujos rápidos y mostrarlos en cámara",

            ],

                "Cocinar un plato laborioso juntos post-viaje",
                "Tarde de spa y masajes en casa",

                "Acostarse a ver las estrellas si el cielo está despejado",
                "Desempacar las maletas juntos con música de fondo",
                "Ir por un helado artesanal",

                "Baño relajante o ducha juntos",
                "Probar un restaurante totalmente nuevo",
                "'Cita a ciegas': uno elige todo el itinerario y el otro solo se deja llevar",
                "Escribir una carta sobre lo que sintieron al verse",
                "Hacer una lista de metas a corto plazo",

            ],
            'casa': [
                "Noche de cocina: Preparar un buen chaufa de pollo desde cero",
                "Sesión musical: Escuchar los últimos arreglos o maquetas de 'Amor sin interés' o 'Calma'",
                "Hacer una rutina de ejercicios o día de pierna en la sala",

                "Maratón de la saga de películas favorita de uno de los dos",
                "Armar un rompecabezas grande",
                "Cata de cervezas o vinos comprados en el supermercado",

                "Reorganizar un cuarto o la decoración juntos",

                "Hacer pizzas caseras armando cada uno su mitad",

                "Revisar y organizar las finanzas de la casa",
                "Hacer alguna manualidad sencilla (origami, arcilla)",
                "Guerra de almohadas clásica",
                "Contarse anécdotas de la infancia que nunca se hayan dicho",
                "Preparar cócteles o bebidas creativas",
                "Acampar en la sala con sábanas y luces"
            ],
            'airelibre': [
                "Salir a volar el dron (el Mini o el Mavic) para hacer tomas aéreas de un paisaje",
                "Tarde deportiva: Ver un partido de fútbol amateur desde la tribuna o jugar juntos en cancha sintética",
                "Hacer una ruta o escape rápido por la región montañosa local",
                "Tomar un paseo en bote por un río o laguna",
                "Buscar el mejor 'huarique' para comer ceviche mixto",
                "Ciclismo urbano (salir a pedalear por la ciudad)",
                "Caminata arquitectónica por el centro histórico",
                "Madrugar para ver el amanecer desde un punto alto",
                "Visitar ruinas, huacas o zonas arqueológicas",
                "Viaje corto a la playa a caminar por la arena",
                "Armar una carpa y acampar una noche",
                "Subir a un mirador de la ciudad",
                "Tarde de fotografía callejera con el celular",
                "Visitar un pueblito cercano al que nunca hayan ido",
                "Ir a los juegos mecánicos o parque de diversiones",
                "Tomar una clase al aire libre",
                "Observación de aves o buscar animales en un bosque",
                "Ir a un cine al aire libre o evento público",
                "Hacer una fogata pequeña (donde sea permitido) y quemar malvaviscos",
                "Volar una cometa",
                "Visitar un jardín botánico o vivero",
                "Salir a pasear al perro (Keylor, si está con ustedes) por un parque grande",
                "Recorrer una feria local de artesanos",
                "Hacer una ruta buscando murales o graffitis urbanos",
                "Sentarse en una plaza simplemente a ver pasar a la gente con un café"
            ]

        // 1. CALCULAR EL PROGRESO
        let misionesCompletadas = [];
        const categorias = ['distancia', 'reencuentro', 'casa', 'airelibre'];
        let totalCompletadas = 0;

        categorias.forEach(cat => {
            const volteadas = JSON.parse(localStorage.getItem('misiones_' + cat)) || [];
            totalCompletadas += volteadas.length;
            
            // Guardamos el texto de cada misión completada para el botón aleatorio
            volteadas.forEach(indice => {
                if(baseDeDatos[cat] && baseDeDatos[cat][indice]) {
                    misionesCompletadas.push(baseDeDatos[cat][indice]);
                }
            });
        });

        // 2. ACTUALIZAR LA BARRA VISUAL (Asumiendo 100 citas en total)
        setTimeout(() => {
            const porcentaje = (totalCompletadas / 100) * 100;
            document.getElementById('barra-progreso').style.width = porcentaje + '%';
            document.getElementById('contador-progreso').innerText = totalCompletadas + " / 100";
        }, 300); // Pequeño retraso para que la animación de llenado se vea bonita al entrar

        // 3. FUNCIÓN: REVIVIR INSTANTE ALEATORIO
        document.getElementById('btn-revivir').addEventListener('click', function(e) {
            if(misionesCompletadas.length === 0) {
                alert("Aún no han sellado ningún recuerdo. ¡Vayan a completar su primera cita!");
                return;
            }

            this.innerText = "VIAJANDO EN EL TIEMPO...";
            
            // Elige una cita que ya hayan hecho al azar
            const recuerdoElegido = misionesCompletadas[Math.floor(Math.random() * misionesCompletadas.length)];
            
            setTimeout(() => {
                localStorage.setItem('misionActual', recuerdoElegido); // Le dice al registro qué cita mostrar
                window.location.href = 'registro.html'; // Viaja directo al registro
            }, 800);
        });
                // 4. EFECTO DE CORAZONES AL ENTRAR A UNA CATEGORÍA
        function crearCorazones(x, y) {
            const colores = ['#00d2ff', '#fbbf24', '#ffffff'];
            for (let i = 0; i < 20; i++) {
                const c = document.createElement('div');
                c.className = 'corazon-particula';
                c.innerHTML = '❤';
                c.style.color = colores[Math.floor(Math.random() * colores.length)];
                c.style.left = x + 'px';
                c.style.top = y + 'px';
                c.style.setProperty('--x', (Math.random() - 0.5) * 300 + 'px');
                c.style.setProperty('--y', (Math.random() - 0.5) * 300 + 'px');
                c.style.setProperty('--duracion', (Math.random() * 0.5 + 0.5) + 's');
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 1000);
            }
        }

        // Le devolvemos la orden a los botones de las categorías
        document.querySelectorAll('.cajon-premium').forEach(boton => {
            boton.addEventListener('click', function(e) {
                e.preventDefault(); // Detiene el viaje inmediato
                
                // Explota los corazones en la posición del dedo
                crearCorazones(e.clientX, e.clientY);
                
                // Efecto de hundimiento
                this.style.transform = 'scale(0.9)'; 
                
                // Espera medio segundo (500ms) para que se vea la animación y luego viaja
                setTimeout(() => {
                    window.location.href = this.getAttribute('href');
                }, 500);
            });
        });
    </script>
        <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        async function revisarPendientes() {
            try {
                // Buscamos todos los recuerdos en la base de datos
                const q = query(collection(db, "recuerdos"));
                const querySnapshot = await getDocs(q);
                let pendientes = 0;

                querySnapshot.forEach((doc) => {
                    const datos = doc.data();
                    
                    // Verificamos el estado de las fotos
                    const tieneFoto1 = datos.foto1 && datos.foto1 !== "";
                    const tieneFoto2 = datos.foto2 && datos.foto2 !== "";
                    
                    // Si el documento tiene una foto, pero le falta la otra, es una tarea pendiente
                    if ((tieneFoto1 && !tieneFoto2) || (!tieneFoto1 && tieneFoto2)) {
                        pendientes++;
                    }
                });

                // Si hay pendientes, mostramos el aviso visual
                if (pendientes > 0) {
                    mostrarNotificacionInApp(pendientes);
                }
            } catch (error) {
                console.error("Error al buscar notificaciones:", error);
            }
        }

        function mostrarNotificacionInApp(cantidad) {
            const alerta = document.createElement('div');
            const textoCita = cantidad === 1 ? "cita" : "citas";
            
            // Mensaje que aparecerá en pantalla
            alerta.innerHTML = `🔔 <b>¡Atención!</b> Tienen ${cantidad} ${textoCita} esperando una foto para ser sellada por completo.`;
            
            // Estilos del banner (Diseño limpio y moderno)
            Object.assign(alerta.style, {
                background: "linear-gradient(135deg, #ef4444, #b91c1c)",
                color: "#ffffff",
                padding: "18px",
                textAlign: "center",
                fontSize: "0.95rem",
                borderRadius: "0 0 20px 20px",
                position: "fixed",
                top: "0",
                left: "0",
                width: "100%",
                zIndex: "1000",
                boxShadow: "0 4px 15px rgba(0,0,0,0.5)",
                cursor: "pointer",
                animation: "bajarAlerta 0.6s cubic-bezier(0.4, 0, 0.2, 1)"
            });
            
            // Al tocar la alerta, se oculta hacia arriba
            alerta.onclick = () => {
                alerta.style.animation = "subirAlerta 0.4s ease-in forwards";
                setTimeout(() => alerta.remove(), 400);
            };

            // Inyectamos las animaciones de movimiento al CSS
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes bajarAlerta { from { transform: translateY(-100%); } to { transform: translateY(0); } }
                @keyframes subirAlerta { from { transform: translateY(0); } to { transform: translateY(-100%); } }
            `;
            document.head.appendChild(style);
            
            // Colocamos la alerta en la pantalla
            document.body.appendChild(alerta);
        }

        // Ejecutamos la función de inmediato al cargar el muro
        revisarPendientes();
    </script>

</body>
</html>
