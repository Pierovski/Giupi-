<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Giupi - Sellar Misión</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #020617; min-height: 100vh; margin: 0; padding-bottom: 50px; color: #f1f5f9; overflow-x: hidden; }

        /* CABECERA */
        .header-registro {
            display: flex; align-items: center; justify-content: space-between;
            padding: 25px 20px 10px; background: transparent;
            position: sticky; top: 0; z-index: 100;
        }
        .btn-volver {
            background: rgba(251, 191, 36, 0.1); color: #fbbf24; border: none; border-radius: 50%;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; text-decoration: none;
        }

        .contenedor-scrapbook { padding: 10px 20px; display: flex; flex-direction: column; gap: 20px; }

        /* TÍTULO ESTILO ESCRITO A MANO */
        .titulo-mision {
            font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #00d2ff;
            margin: 0; text-shadow: 0 2px 5px rgba(0, 210, 255, 0.3); line-height: 1.1;
        }
        .iconos-top { font-size: 1.5rem; letter-spacing: 5px; opacity: 0.8; }

        /* MARCOS DE FOTO ESTILO SCRAPBOOK (POLAROID) */
        .zona-fotos { display: flex; justify-content: center; position: relative; height: 260px; margin-top: 10px; }
        
        .marco-foto {
            background: #f8fafc; padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: absolute; display: flex; align-items: center; justify-content: center;
            flex-direction: column; cursor: pointer; transition: transform 0.3s;
        }
        .marco-foto:active { transform: scale(0.95) !important; }
        
        /* Foto 1 (Fondo, ligeramente inclinada) */
        .foto-1 {
            width: 160px; height: 200px; transform: rotate(-8deg); left: 10px; top: 20px; z-index: 1;
            border: 1px solid #cbd5e1;
        }
        /* Foto 2 (Frente, recta) */
        .foto-2 {
            width: 180px; height: 220px; transform: rotate(4deg); right: 10px; top: 0; z-index: 2;
            border: 1px solid #fbbf24;
        }

        .area-imagen { width: 100%; height: 100%; background: #e2e8f0; object-fit: cover; border: 1px dashed #94a3b8; }
        .texto-foto { color: #64748b; font-size: 0.7rem; margin-top: 10px; font-weight: 600; text-transform: uppercase; }

        /* INPUTS TIPO LÍNEA (FECHA Y LUGAR) */
        .zona-datos { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .dato-linea { display: flex; align-items: flex-end; gap: 10px; }
        .dato-linea label { color: #fbbf24; font-weight: 600; font-size: 0.9rem; }
        .dato-linea input {
            flex-grow: 1; background: transparent; border: none; border-bottom: 2px solid rgba(251, 191, 36, 0.4);
            color: #f8fafc; font-size: 1rem; padding: 5px; outline: none; font-family: 'Dancing Script', cursive; font-size: 1.4rem;
        }
        .dato-linea input:focus { border-bottom-color: #00d2ff; }

        /* ÁREA DE TEXTO (LÍNEAS DE CUADERNO) */
        .titulo-sentimientos { color: #00d2ff; font-weight: 600; font-size: 1.1rem; margin: 20px 0 5px; display: flex; align-items: center; justify-content: space-between; }
        
        .cuaderno-lineas {
            width: 100%; height: 130px; background-color: transparent;
            /* Magia CSS para crear las líneas */
            background-image: repeating-linear-gradient(transparent, transparent 34px, rgba(251, 191, 36, 0.2) 35px);
            line-height: 35px; border: none; color: #f8fafc; font-size: 1rem;
            resize: none; outline: none; padding: 0 5px; font-family: 'Poppins', sans-serif;
        }

        /* BOTÓN DE GUARDAR */
        .btn-guardar {
            background: linear-gradient(135deg, #00d2ff, #0077ff); color: #020617; border: none; padding: 18px; border-radius: 15px;
            font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 20px; transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2); width: 100%;
        }

        .corazon-particula { position: fixed; pointer-events: none; z-index: 2000; animation: volar-particula var(--duracion) ease-out forwards; }
        @keyframes volar-particula { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; } }
    </style>
</head>
<body>

    <header class="header-registro">
        <a href="#" class="btn-volver" onclick="history.back(); return false;">←</a>
    </header>

    <main class="contenedor-scrapbook">
        
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <h1 class="titulo-mision" id="txt-mision">Cargando...</h1>
            <span class="iconos-top">🥂✨</span>
        </div>

        <input type="file" id="input-foto1" accept="image/*" style="display: none;">
        <input type="file" id="input-foto2" accept="image/*" style="display: none;">

        <div class="zona-fotos">
            <div class="marco-foto foto-1" onclick="document.getElementById('input-foto1').click()">
                <img src="" class="area-imagen" id="prev-foto1" style="opacity: 0;">
                <span class="texto-foto" id="txt-foto1">FOTO 1</span>
            </div>
            <div class="marco-foto foto-2" onclick="document.getElementById('input-foto2').click()">
                <img src="" class="area-imagen" id="prev-foto2" style="opacity: 0;">
                <span class="texto-foto" id="txt-foto2">FOTO 2</span>
            </div>
        </div>

        <div class="zona-datos">
            <div class="dato-linea">
                <label>Fecha:</label>
                <input type="text" placeholder="Ej: 29 de Mayo">
            </div>
            <div class="dato-linea">
                <label>Lugar:</label>
                <input type="text" placeholder="¿Dónde estuvimos?">
            </div>
        </div>

        <div>
            <h3 class="titulo-sentimientos">¿Cómo nos sentimos? <span style="font-size: 1.2rem;">📝💭</span></h3>
            <textarea class="cuaderno-lineas" placeholder="Escribe aquí su historia..."></textarea>
        </div>

        <button class="btn-guardar" id="btn-submit" onclick="guardarRecuerdo(event)">SELLAR RECUERDO</button>

    </main>

        <script type="module">
        import { db } from './firebase-config.js';
        // Añadimos getDocs, query y where para poder buscar en la base de datos
        import { collection, addDoc, serverTimestamp, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 1. CARGAR DATOS DE LA MISIÓN
        const misionActual = localStorage.getItem('misionActual') || "Nuestro Recuerdo";
        const cat = localStorage.getItem('misionCategoria');
        const idx = parseInt(localStorage.getItem('misionIndex'));
        document.getElementById('txt-mision').innerText = misionActual;

        // 2. ESCÁNER DE EMOJIS
        function obtenerIconoContextual(texto) {
            const t = texto.toLowerCase();
            if(t.includes('película') || t.includes('cine')) return '🍿🎬';
            if(t.includes('cena') || t.includes('chaufa')) return '🍕🍷';
            if(t.includes('dron') || t.includes('tomas')) return '🚁📸';
            if(t.includes('playa') || t.includes('arena')) return '🏖️🌊';
            if(t.includes('abrazo') || t.includes('beso')) return '🫂❤️';
            if(t.includes('fútbol') || t.includes('pierna')) return '⚽🏋️‍♂️';
            if(t.includes('viaje') || t.includes('acamp')) return '🏕️🎒';
            if(t.includes('música') || t.includes('karaoke')) return '🎵🎤';
            if(t.includes('foto')) return '📸✨';
            return '🥂✨';
        }
        document.querySelector('.iconos-top').innerText = obtenerIconoContextual(misionActual);

        // ==========================================
        // NUEVO: SENSOR DE LECTURA (Traer las fotos)
        // ==========================================
        async function verificarRecuerdo() {
            if (!cat || isNaN(idx)) return;

            try {
                // Buscamos si esta cita exacta ya tiene datos guardados
                const q = query(
                    collection(db, "recuerdos"),
                    where("categoria", "==", cat),
                    where("citaNumero", "==", idx)
                );
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const datos = querySnapshot.docs[0].data();
                    
                    // Mostrar Foto 1 si existe
                    if (datos.foto1) {
                        const img1 = document.getElementById('prev-foto1');
                        img1.src = datos.foto1;
                        img1.style.opacity = '1';
                        document.getElementById('txt-foto1').style.display = 'none';
                    }
                    
                    // Mostrar Foto 2 si existe
                    if (datos.foto2) {
                        const img2 = document.getElementById('prev-foto2');
                        img2.src = datos.foto2;
                        img2.style.opacity = '1';
                        document.getElementById('txt-foto2').style.display = 'none';
                    }

                    // Mostrar el texto y bloquear edición
                    const areaTexto = document.querySelector('textarea');
                    if (areaTexto) {
                        areaTexto.value = datos.nota || "";
                        areaTexto.readOnly = true; 
                    }

                    // Cambiar el botón para indicar que ya está sellado
                    const btn = document.getElementById('btn-submit');
                    if (btn) {
                        btn.innerText = "RECUERDO SELLADO ✨";
                        btn.style.background = "linear-gradient(135deg, #4b5563, #1f2937)";
                        btn.disabled = true;
                    }
                }
            } catch (error) {
                console.error("Error al buscar el recuerdo:", error);
            }
        }
        
        // Ejecutamos la búsqueda apenas abre la página
        verificarRecuerdo();

        // 3. CAPTURA DE FOTOS EN MEMORIA
        let archivoFoto1 = null;
        let archivoFoto2 = null;

        function configurarInputFoto(inputId, prevId, txtId, numFoto) {
            const input = document.getElementById(inputId);
            if(input) {
                input.addEventListener('change', function() {
                    const archivo = this.files[0];
                    if (archivo) {
                        if(numFoto === 1) archivoFoto1 = archivo;
                        if(numFoto === 2) archivoFoto2 = archivo;

                        const lector = new FileReader();
                        lector.onload = function(e) {
                            const img = document.getElementById(prevId);
                            img.src = e.target.result;
                            img.style.opacity = '1';
                            img.style.border = 'none';
                            document.getElementById(txtId).style.display = 'none';
                        }
                        lector.readAsDataURL(archivo);
                    }
                });
            }
        }
        configurarInputFoto('input-foto1', 'prev-foto1', 'txt-foto1', 1);
        configurarInputFoto('input-foto2', 'prev-foto2', 'txt-foto2', 2);

        // 4. EL MOTOR DE SUBIDA (ImgBB)
        const IMGBB_API_KEY = '055cde6238b2cefe13e31dc43f2b2570';

        async function subirFotoAImgBB(archivo) {
            if (!archivo) return null;
            const formData = new FormData();
            formData.append('image', archivo);
            
            try {
                const respuesta = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const datos = await respuesta.json();
                return datos.data.url; 
            } catch (error) {
                console.error("Error en topografía de imagen:", error);
                return null;
            }
        }

        // 5. GUARDADO OFICIAL (Conexión Firebase + ImgBB)
        const botonGuardar = document.getElementById('btn-submit');
        if(botonGuardar) {
            botonGuardar.addEventListener('click', async (evento) => {
                evento.preventDefault();
                botonGuardar.innerText = "SUBIENDO FOTOS... ⏳";
                botonGuardar.disabled = true;

                try {
                    const urlFoto1 = await subirFotoAImgBB(archivoFoto1);
                    const urlFoto2 = await subirFotoAImgBB(archivoFoto2);

                    botonGuardar.innerText = "SELLANDO EN FIREBASE... 🔐";

                    const nota = document.querySelector('textarea') ? document.querySelector('textarea').value : ""; 

                    await addDoc(collection(db, "recuerdos"), {
                        categoria: cat,
                        citaNumero: idx,
                        mision: misionActual,
                        nota: nota,
                        foto1: urlFoto1 || "",
                        foto2: urlFoto2 || "",
                        fecha: serverTimestamp() 
                    });

                    if (cat && !isNaN(idx)) {
                        let completadas = JSON.parse(localStorage.getItem('misiones_' + cat)) || [];
                        if (!completadas.includes(idx)) {
                            completadas.push(idx);
                            localStorage.setItem('misiones_' + cat, JSON.stringify(completadas));
                        }
                    }

                    botonGuardar.innerText = "¡RECUERDO INMORTALIZADO! ✨";
                    botonGuardar.style.background = "linear-gradient(135deg, #fbbf24, #f59e0b)";
                    
                    const x = evento.clientX || window.innerWidth / 2;
                    const y = evento.clientY || window.innerHeight / 2;
                    crearExplosionCorazones(x, y);
                    
                    const sonidoGiupi = new Audio('giupi.mp3');
                    sonidoGiupi.play().catch(e => console.log("Audio bloqueado"));

                    setTimeout(() => history.back(), 2000);

                } catch (error) {
                    alert("Hubo un error de conexión. Intenta de nuevo.");
                    console.error("Falla estructural en el guardado:", error);
                    botonGuardar.innerText = "INTENTAR DE NUEVO";
                    botonGuardar.disabled = false;
                }
            });
        }

        // 6. ANIMACIÓN DE CORAZONES
        function crearExplosionCorazones(x, y) {
            const colores = ['#00d2ff', '#fbbf24', '#ffffff'];
            for (let i = 0; i < 30; i++) {
                const c = document.createElement('div');
                c.className = 'corazon-particula';
                c.innerHTML = '❤';
                c.style.color = colores[Math.floor(Math.random() * colores.length)];
                c.style.left = x + 'px'; c.style.top = y + 'px';
                c.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'px');
                c.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'px');
                c.style.setProperty('--duracion', (Math.random() * 0.5 + 0.5) + 's');
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 1200);
            }
        }
    </script>
</body>
</html>
